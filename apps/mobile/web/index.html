<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>OrgsLedger — Organization Management Platform</title>
    <meta name="description" content="Manage your organization's members, finances, meetings, and communications in one place." />
    <meta name="theme-color" content="#0B1426" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo-512.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta property="og:title" content="OrgsLedger" />
    <meta property="og:description" content="Cross-Border Organizational Infrastructure — manage members, finances & meetings." />
    <meta property="og:image" content="/logo-512.png" />
    <meta property="og:type" content="website" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* Smooth global transitions for OrgsLedger */
      * { -webkit-tap-highlight-color: transparent; }
      body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      /* Scrollbar theming for dark UI */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.25); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.4); }
      /* Smooth link/button transitions */
      [role="button"], a, button { transition: opacity 0.15s ease, transform 0.15s ease; }
      [role="button"]:active, button:active { transform: scale(0.97); }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
