<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OrgsLedger — Organization Management Platform">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OrgsLedger">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OrgsLedger</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #060D18;
      overflow: hidden;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #060D18;
      z-index: 999;
      transition: opacity 0.4s ease;
    }
    #loading.loaded { opacity: 0; pointer-events: none; }
    #loading .logo-box {
      width: 100px; height: 100px;
      border-radius: 20px;
      overflow: hidden;
    }
    #loading .logo-box img { width: 100%; height: 100%; object-fit: cover; }
    #loading h1 {
      margin: 24px 0 0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #C9A84C;
      letter-spacing: -0.5px;
    }
    #loading .spinner {
      margin-top: 32px;
      width: 28px; height: 28px;
      border: 2.5px solid rgba(201, 168, 76, 0.2);
      border-top-color: #C9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-box">
      <img src="icons/Icon-512.png" alt="OrgsLedger">
    </div>
    <h1>OrgsLedger</h1>
    <p style="margin:8px 0 0;font-family:'Inter',system-ui,sans-serif;font-size:13px;color:rgba(240,237,229,0.5);letter-spacing:0.2px;">Organization Management Platform</p>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('loaded'); setTimeout(function(){ el.remove(); }, 400); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
