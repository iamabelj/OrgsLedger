services:
  postgres:
    image: postgres:16-alpine
    container_name: orgsledger_db
    restart: always
    environment:
      POSTGRES_USER: orgsledger
      POSTGRES_PASSWORD: ${DB_PASSWORD:-orgsledger_prod_2026}
      POSTGRES_DB: orgsledger
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgsledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orgsledger_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: orgsledger_api
    restart: always
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - apps/api/.env.production
    volumes:
      - uploads:/app/apps/api/uploads
      - ./apps/api/google-credentials.json:/app/apps/api/google-credentials.json:ro

  web:
    image: nginx:alpine
    container_name: orgsledger_web
    restart: always
    volumes:
      - ./apps/mobile/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - livekit
    networks:
      - default

  certbot:
    image: certbot/certbot
    container_name: orgsledger_certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - ./apps/mobile/dist:/usr/share/nginx/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /usr/share/nginx/html --quiet; done'"

  # ── LiveKit Server ─────────────────────────────────────
  # Self-hosted LiveKit for video/audio conferencing.
  # All participants receive backend-issued tokens — no external login.
  # See: https://docs.livekit.io/realtime/self-hosting/

  livekit:
    image: livekit/livekit-server:latest
    container_name: orgsledger_livekit
    restart: always
    ports:
      - "7880:7880"     # HTTP / WebSocket
      - "7881:7881"     # RTC/TCP
      - "7882:7882/udp" # RTC/UDP
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml:ro
    command: ["--config", "/etc/livekit.yaml"]
    networks:
      - default

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot_etc:
  certbot_var:
