# ============================================================
# OrgsLedger — Distributed Architecture Services
# ADDITIVE overlay for docker-compose.prod.yml
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.scale.yml up -d
# ============================================================

services:
  # ── NATS JetStream ─────────────────────────────────────
  # Lightweight event streaming for microservice communication.
  # 256MB memory limit — handles 100K+ messages/sec.
  nats:
    image: nats:2.10-alpine
    container_name: orgsledger_nats
    restart: always
    ports:
      - "4222:4222"     # Client connections
      - "8222:8222"     # HTTP monitoring
    command: ["--js", "--sd", "/data", "-m", "8222", "--max_payload", "1048576"]
    volumes:
      - natsdata:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Broadcast Worker ───────────────────────────────────
  # Handles Socket.IO broadcasting across multiple API instances.
  broadcast-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    container_name: orgsledger_broadcast_worker
    restart: always
    environment:
      - WORKER_TYPE=broadcast
      - NATS_URL=nats://nats:4222
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - apps/api/.env.production
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ── OpenTelemetry Collector ────────────────────────────
  # Receives traces/metrics from all services, exports to backends.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: orgsledger_otel
    restart: always
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "8889:8889"     # Prometheus metrics
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ── Prometheus ─────────────────────────────────────────
  # Scrapes metrics from API, workers, NATS, and OTel collector.
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: orgsledger_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ── Grafana ────────────────────────────────────────────
  # Visualization dashboards for all metrics and traces.
  grafana:
    image: grafana/grafana:10.4.0
    container_name: orgsledger_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-orgsledger2026}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  natsdata:
  prometheusdata:
  grafanadata:
