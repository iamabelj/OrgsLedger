version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orgsledger_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: orgsledger
      POSTGRES_PASSWORD: orgsledger_dev
      POSTGRES_DB: orgsledger
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: orgsledger_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  livekit:
    image: livekit/livekit-server:latest
    container_name: orgsledger_livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50060:50000-50060/udp"
    environment:
      LIVEKIT_API_SECRET: orgsledger_dev_secret_key_2025
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml --node-ip=0.0.0.0

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: orgsledger_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - apps/api/.env
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

volumes:
  pgdata:
  redisdata:
