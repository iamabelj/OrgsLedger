# OrgsLedger Production Nginx Configuration
# Domain: api.orgsledger.com (API)
# Domain: orgsledger.com (Landing page)

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name orgsledger.com www.orgsledger.com api.orgsledger.com app.orgsledger.com;
    return 301 https://$host$request_uri;
}

# Redirect app.orgsledger.com -> orgsledger.com/app/
server {
    listen 443 ssl http2;
    server_name app.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/api.orgsledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.orgsledger.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://orgsledger.com/app$request_uri;
}

# Landing page - orgsledger.com
server {
    listen 443 ssl http2;
    server_name orgsledger.com www.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/api.orgsledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.orgsledger.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/orgsledger.com;
    index index.html;

    # /login should always land on the organizations login page
    location = /login {
        return 301 /app/login;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Expo static assets — the build references /_expo/ and /assets/ as absolute paths
    location /_expo/ {
        alias /var/www/orgsledger.com/app/_expo/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        alias /var/www/orgsledger.com/app/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Organizations web app (Expo)
    location /app/ {
        alias /var/www/orgsledger.com/app/;
        try_files $uri $uri/ /app/index.html;
    }

    # Developer console — serve admin.html for all /developer/* paths
    location /developer/ {
        rewrite ^/developer/.*$ /admin.html break;
    }

    # Legal pages
    location /legal/ {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# API - api.orgsledger.com
server {
    listen 443 ssl http2;
    server_name api.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/api.orgsledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.orgsledger.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Increase timeouts for long-running requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Max upload size
    client_max_body_size 50M;

    # All API routes go to Node.js backend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Socket.IO for real-time WebSocket connections
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # Prometheus metrics (internal only - restrict in production)
    location /metrics {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Uncomment to restrict to localhost only:
        # allow 127.0.0.1;
        # deny all;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}
