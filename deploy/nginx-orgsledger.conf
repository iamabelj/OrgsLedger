# OrgsLedger Production Nginx Configuration
# Domain: app.orgsledger.com (API + Frontend)
# Domain: orgsledger.com (Landing page)

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name orgsledger.com www.orgsledger.com app.orgsledger.com;
    return 301 https://$host$request_uri;
}

# Landing page - orgsledger.com
server {
    listen 443 ssl http2;
    server_name orgsledger.com www.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/orgsledger.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orgsledger.com-0001/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/orgsledger.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# App + API - app.orgsledger.com
server {
    listen 443 ssl http2;
    server_name app.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/orgsledger.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orgsledger.com-0001/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Increase timeouts for long-running requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Max upload size
    client_max_body_size 50M;

    # API proxy - /api/* routes to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Socket.IO for real-time WebSocket connections
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # Prometheus metrics (internal only - restrict in production)
    location /metrics {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Uncomment to restrict to localhost only:
        # allow 127.0.0.1;
        # deny all;
    }

    # Frontend app (Flutter/React Native web build)
    location / {
        root /var/www/app.orgsledger.com;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}
