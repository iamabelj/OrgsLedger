# ── Initial config (HTTP only, for SSL certificate setup) ─
upstream api_backend {
    server api:3000;
}

# All domains — Let's Encrypt + proxy to API
server {
    listen 80;
    server_name orgsledger.com www.orgsledger.com api.orgsledger.com app.orgsledger.com meet.orgsledger.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    client_max_body_size 200M;

    # Proxy everything to the API server (handles host-based routing)
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
