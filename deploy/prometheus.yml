# ============================================================
# Prometheus Configuration for OrgsLedger
# Scrapes API instances, standalone workers, NATS, and OTel.
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ── API Server ─────────────────────────────────────────
  - job_name: 'orgsledger-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ── NATS Server ────────────────────────────────────────
  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
    metrics_path: '/varz'

  # ── OpenTelemetry Collector ────────────────────────────
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # ── Node Exporter (host metrics) ───────────────────────
  # Uncomment when node_exporter is deployed
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
