# ── Upstream API ─────────────────────────────────
upstream api_backend {
    server api:3000;
}

# ── HTTP → redirect to HTTPS (after SSL is set up) ─
server {
    listen 80;
    server_name orgsledger.com www.orgsledger.com api.orgsledger.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Web Frontend (HTTPS) ────────────────────────
server {
    listen 443 ssl;
    server_name orgsledger.com www.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/orgsledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orgsledger.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── API (HTTPS) ─────────────────────────────────
server {
    listen 443 ssl;
    server_name api.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/orgsledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orgsledger.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 200M;

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
