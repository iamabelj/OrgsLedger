# ── Upstream API ─────────────────────────────────
# The Express API server handles host-based routing internally:
#   orgsledger.com       → landing page + admin console + gateway API
#   app.orgsledger.com   → Expo mobile web app + API
#   api.orgsledger.com   → API only
upstream api_backend {
    server api:3000;
}

# ── HTTP → redirect to HTTPS ────────────────────
server {
    listen 80;
    server_name orgsledger.com www.orgsledger.com api.orgsledger.com app.orgsledger.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Landing / Admin Console (HTTPS) ─────────────
# Proxies to API server which uses isLandingHost() to serve
# landing page, developer console, and gateway API routes
server {
    listen 443 ssl;
    server_name orgsledger.com www.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/orgsledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orgsledger.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 200M;

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# ── Mobile Web App (HTTPS) ──────────────────────
# Proxies to API server which serves the Expo web build
# and API routes for app.orgsledger.com
server {
    listen 443 ssl;
    server_name app.orgsledger.com;

    ssl_certificate /etc/letsencrypt/live/orgsledger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orgsledger.com/privkey.pem;
