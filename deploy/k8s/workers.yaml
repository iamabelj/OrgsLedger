# ============================================================
# OrgsLedger — Standalone Worker Deployments
# Each worker type is independently scalable.
# ============================================================

# ── Translation Worker ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: translation-worker
  namespace: orgsledger
  labels:
    app: translation-worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: translation-worker
  template:
    metadata:
      labels:
        app: translation-worker
    spec:
      containers:
        - name: worker
          image: orgsledger/worker:latest
          env:
            - name: WORKER_TYPE
              value: translation
          envFrom:
            - configMapRef:
                name: orgsledger-config
            - secretRef:
                name: orgsledger-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      terminationGracePeriodSeconds: 30

---
