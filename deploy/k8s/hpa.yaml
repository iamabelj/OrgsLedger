# ============================================================
# OrgsLedger — Autoscaling (HPA + KEDA ScaledObjects)
# Production config for 50k simultaneous meetings.
#
# Prerequisites:
#   - KEDA v2.x installed (helm install keda kedacore/keda)
#   - Prometheus accessible at prometheus.orgsledger:9090
#   - Redis Cluster accessible at redis-cluster:6379
# ============================================================

# ──────────────────────────────────────────────────────────
#  API  —  Standard HPA (CPU + memory)
# ──────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: orgsledger
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 5
  maxReplicas: 40
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 5
          periodSeconds: 30
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120

---
# ──────────────────────────────────────────────────────────
#  TRANSCRIPT WORKER  —  KEDA ScaledObject
#  Scales on Redis queue depth (sharded BullMQ queues).
#  20→200 pods.  Target: ≤100 waiting jobs per pod.
# ──────────────────────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: transcription-worker-scaledobject
  namespace: orgsledger
  labels:
    app: transcription-worker
spec:
  scaleTargetRef:
    name: transcription-worker
  pollingInterval: 10
  cooldownPeriod: 60
  idleReplicaCount: 10
  minReplicaCount: 20
  maxReplicaCount: 200
  fallback:
    failureThreshold: 3
    replicas: 30
  triggers:
    # Queue depth from Prometheus (aggregated across all shards)
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.orgsledger.svc.cluster.local:9090
        metricName: orgsledger_queue_waiting_jobs_transcript
        query: |
          sum(orgsledger_queue_waiting_jobs{queue=~"transcript.*"})
        threshold: "100"
        activationThreshold: "10"
    # CPU-based fallback trigger
    - type: cpu
      metricType: Utilization
      metadata:
        value: "60"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 15
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 20
              periodSeconds: 30
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 10
              periodSeconds: 60

---
# ── Transcript Worker HPA (fallback if KEDA unavailable) ─
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transcription-worker-hpa
  namespace: orgsledger
  annotations:
    keda.sh/managed: "true"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transcription-worker
  minReplicas: 20
  maxReplicas: 200
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 5
          periodSeconds: 120

---
