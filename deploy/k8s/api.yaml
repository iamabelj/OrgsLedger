# ============================================================
# OrgsLedger API — Kubernetes Deployment
# Horizontally scalable API pods with Redis-backed Socket.IO.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: orgsledger
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: orgsledger/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: orgsledger-config
            - secretRef:
                name: orgsledger-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: orgsledger
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
  # Use sticky sessions for Socket.IO WebSocket connections
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
