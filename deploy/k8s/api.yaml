# ============================================================
# OrgsLedger API — Kubernetes Deployment
# Production-grade API pods for 50k meetings.
# Socket.IO sticky sessions via Redis adapter.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: orgsledger
  labels:
    app: api
    tier: frontend
spec:
  replicas: 5
  selector:
    matchLabels:
      app: api
  strategy:
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api
      containers:
        - name: api
          image: orgsledger/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: orgsledger-config
            - secretRef:
                name: orgsledger-secrets
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: orgsledger
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: orgsledger
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: api
