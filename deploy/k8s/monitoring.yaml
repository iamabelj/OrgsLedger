# ============================================================
# OrgsLedger — Monitoring Stack (Prometheus + Grafana + OTel)
# Production observability for 50k meetings.
# ============================================================

# ── OpenTelemetry Collector ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: orgsledger
  labels:
    app: otel-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8889
              name: prometheus
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: orgsledger
spec:
  selector:
    app: otel-collector
  ports:
    - port: 4317
      name: otlp-grpc
    - port: 4318
      name: otlp-http
    - port: 8889
      name: prometheus

---
# ── OTel Collector ConfigMap ─────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: orgsledger
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        send_batch_size: 2048
        timeout: 5s
      memory_limiter:
        limit_mib: 400
        spike_limit_mib: 100
        check_interval: 5s
      resource:
        attributes:
          - key: deployment.environment
            value: production
            action: upsert
    exporters:
      logging:
        loglevel: warn
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: orgsledger
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [logging]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [prometheus, logging]

---
# ── Prometheus ───────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  namespace: orgsledger
  labels:
    app: prometheus
spec:
  serviceName: prometheus
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=30d"
            - "--storage.tsdb.retention.size=50GB"
            - "--web.enable-lifecycle"
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: prom-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prom-data
              mountPath: /prometheus
      volumes:
        - name: prom-config
          configMap:
            name: prometheus-config
  volumeClaimTemplates:
    - metadata:
        name: prom-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: orgsledger
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
# ── Prometheus ConfigMap ─────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: orgsledger
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    scrape_configs:
      # ── API pods ─────────────────────────────────────────
      - job_name: 'orgsledger-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['orgsledger']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: api
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:3000

      # ── All worker pods (label tier=worker) ──────────────
      - job_name: 'orgsledger-workers'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['orgsledger']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_tier]
            regex: worker
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:3000
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: worker_type

      # ── Redis Cluster ────────────────────────────────────
      - job_name: 'redis-cluster'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['orgsledger']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: redis-cluster
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:9121
        metrics_path: '/metrics'

      # ── OTel Collector ───────────────────────────────────
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']

      # ── KEDA metrics ─────────────────────────────────────
      - job_name: 'keda'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['keda']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: keda-operator
            action: keep

---
# ── Grafana ──────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: grafana
  namespace: orgsledger
  labels:
    app: grafana
spec:
  serviceName: grafana
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orgsledger-secrets
                  key: GRAFANA_PASSWORD
                  optional: true
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.orgsledger.com"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
  volumeClaimTemplates:
    - metadata:
        name: grafana-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: orgsledger
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000

---
# ── Grafana Datasource Provisioning ─────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: orgsledger
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.orgsledger.svc.cluster.local:9090
        isDefault: true
        editable: false
